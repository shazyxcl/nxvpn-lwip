name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK (lwIP + NDK)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. NDK + CMake ───────────────────────────────────────────────────────
      - name: Set up Android NDK r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Set up CMake 3.22.1
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.1'

      # ── 4. Cache lwIP source ─────────────────────────────────────────────────
      - name: Cache lwIP 2.2.0
        id: cache-lwip
        uses: actions/cache@v4
        with:
          path: app/src/main/jni/lwip
          key: lwip-2.2.0

      - name: Download and extract lwIP 2.2.0
        if: steps.cache-lwip.outputs.cache-hit != 'true'
        run: |
          wget -q https://download.savannah.nongnu.org/releases/lwip/lwip-2.2.0.zip \
               -O /tmp/lwip.zip
          unzip -q /tmp/lwip.zip -d /tmp/lwip_src
          mkdir -p app/src/main/jni/lwip
          cp -r /tmp/lwip_src/lwip-2.2.0/* app/src/main/jni/lwip/
          echo "lwIP 2.2.0 ready at app/src/main/jni/lwip"

      # ── 5. Cache Gradle dependencies ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 6. Grant permissions ──────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 7. Set ANDROID_NDK_HOME ───────────────────────────────────────────────
      - name: Export NDK path
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "NDK path: ${{ steps.setup-ndk.outputs.ndk-path }}"

      # ── 8. Clean ──────────────────────────────────────────────────────────────
      - name: Clean project
        run: ./gradlew clean

      # ── 9. Build Debug APK (includes CMake native build) ─────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ── 10. Build Release APK ─────────────────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # ── 11. Verify native .so files terbuat ───────────────────────────────────
      - name: Verify liblwip_tunnel.so exists
        run: |
          echo "=== Checking native .so files ==="
          find app/build -name "liblwip_tunnel.so" | while read f; do
            echo "✅ Found: $f"
            ls -lh "$f"
          done
          COUNT=$(find app/build -name "liblwip_tunnel.so" | wc -l)
          echo "Total .so files: $COUNT"
          if [ "$COUNT" -eq "0" ]; then
            echo "❌ ERROR: liblwip_tunnel.so not found!"
            exit 1
          fi

      # ── 12. Upload Debug APK ──────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: kontolodon-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 13. Upload Release APK ────────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: kontolodon-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      # ── 14. Upload native .so sebagai artifact (untuk debugging) ──────────────
      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-lwip
          path: app/build/intermediates/cmake/**/obj/**/*.so
          retention-days: 3
          if-no-files-found: warn
